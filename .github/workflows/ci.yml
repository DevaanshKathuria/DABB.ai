name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile sources
        run: python -m compileall app.py streamlit_app.py src tests

      - name: Run smoke tests
        env:
          PYTHONPATH: src:.
        run: pytest -q tests/test_release_smoke.py

      - name: Run tests
        env:
          PYTHONPATH: src:.
        run: pytest -q
